<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <h1>Cadastro</h1>
    <form >
        <input type="text" name="aluno" id="aluno" value="Aluno" disabled>
        <br>

        <label for="matricula">Matricula:</label>
        <input type="number" name="matricula" id="matricula" min="0" max="999">
        <br>

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="email@gmail.com">
        <br>

        <label for="senha">Senha:</label>
        <input type="password" name="senha" id="senha">
        <br>

        <label for="data">Data Nascimento:</label>
        <input type="date" id="data" name="data">
        <br>

        <label for="atuacao">Atuação:</label>
        <br>
        <input type="checkbox" name="atuacao" id="atuacao" value="trabalha">Trabalha
        <br>
        <input type="checkbox" name="atuacao" id="atuacao" value="estuda">Estuda
        <br>
        <input type="checkbox" name="atuacao" id="atuacao" value="lar">Do Lar
        <br>

        <label for="curso">Curso:</label>
        <select name="curso" id="curso">
            <optgroup label="Tecnologia">
                <option value="ADS">ADS</option>
                <option value="DSM">DSM</option>
            </optgroup>
            <optgroup label="Empresarial">
                <option value="COMEX">COMEX</option>
                <option value="GE">GE</option>
            </optgroup>
            <optgroup label="Quimica">
                <option value="PQ">PQ</option>
            </optgroup>
        </select>
        <br>

        <select name="ciclo" id="ciclo" multiple>
            <option value="1">Primeiro</option>
            <option value="2">Segundo</option>
            <option value="3">Terceiro</option>
            <option value="4">Quarto</option>
            <option value="5">Quinto</option>
            <option value="6">Sexto</option>
        </select>
        <br>

        <label for="telefone">Telefone</label>
        <input type="tel" name="telefone" id="telefone" placeholder="(99)" pattern="\([0-9]{2}\)[0-9]{5}-[0-9]{4}">
        <br>
        <label for="sexo">Sexo:</label>
        <input type="radio" name="sexo" value="Feminino">Feminino
        <input type="radio" name="sexo" value="Masculino">Masculino
        <br>

        <fieldset>
            <legend>Deixe sua mensagem</legend>
            <textarea name="mensagem" id="mensagem" rows="10" cols="50"></textarea>
        </fieldset>
        <input type="reset" value="reset">Reset
        <input type="submit" value="cadastrar">Cadastrar
    </form>
</body>
</html>
